name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app
      - name: Run complete non-launching verification
        run: WOC_SKIP_RESOURCE_CHECK=1 ./scripts/verify.sh
